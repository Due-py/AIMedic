# Codemagic CI: builds an UNSIGNED iOS .ipa for sideloading (Sideloadly /
# AltStore with a free Apple ID). Signed App Store builds can be added later
# once an Apple Developer account exists.
workflows:
  ios-unsigned:
    name: iOS unsigned ipa
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    working_directory: mobile
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Package ipa
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr AIMedic.ipa Payload
    artifacts:
      # Listed twice because artifact patterns may resolve relative to the
      # clone root or the working directory; unmatched patterns are ignored.
      - mobile/build/ios/iphoneos/AIMedic.ipa
      - build/ios/iphoneos/AIMedic.ipa
      - mobile/build/ios/iphoneos/*.ipa
      - build/ios/iphoneos/*.ipa

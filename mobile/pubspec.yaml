name: aimedic
description: "AI School Health Coach - AI health companion for middle school students."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  dio: ^5.10.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: 0.20.2
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  confetti: ^0.8.0
  pedometer: ^4.2.0
  permission_handler: ^12.0.3
  image_picker: ^1.2.3
  camera: ^0.12.0+1
  google_mlkit_pose_detection: ^0.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
